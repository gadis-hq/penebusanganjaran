<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GADIS QS HQ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#fff0f5;
text-align:center;
}

.winner-ticker{
width:100%;
background:#000;
color:#00ffcc;
overflow:hidden;
padding:10px 0;
font-weight:bold;
font-size:18px;
border-bottom:2px solid #00ffcc;
}

#tickerText{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:tickerMove 20s linear infinite;
}

@keyframes tickerMove{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}  

/* HEADER */

header{
background:linear-gradient(45deg,#ff0080,#ff4da6);
color:white;
padding:25px;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* SEMAK KOD */

.box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin:30px 0;
position:relative;
}

/* SCAN LASER */

.laser{
position:absolute;
height:3px;
width:100%;
background:red;
animation:scan 2s infinite;
display:none;
}

@keyframes scan{
0%{top:0}
50%{top:100%}
100%{top:0}
}

/* INPUT */

input{
width:80%;
padding:15px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:14px 25px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff0080,#ff4da6);
color:white;
font-weight:bold;
cursor:pointer;
}

/* LOADING TEXT */

.loading{
font-style:italic;
color:#999;
filter:blur(1px);
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

/* RESULT */

.resultCard{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:left;
}

/* COUNTER */

.counter{
font-size:28px;
color:#ff0080;
font-weight:bold;
margin:20px 0;
}

/* MAP */

#map{
height:400px;
border-radius:10px;
}
.marker-glow{
width:20px;
height:20px;
background:#ff0080;
border-radius:50%;
box-shadow:0 0 10px #ff0080,0 0 20px #ff0080;
animation:glowPulse 1.5s infinite;
}

@keyframes glowPulse{
0%{transform:scale(1);opacity:0.8}
50%{transform:scale(1.6);opacity:0.3}
100%{transform:scale(1);opacity:0.8}
}

.drop{
animation:drop 0.6s ease;
}

@keyframes drop{
0%{transform:translateY(-200px)}
100%{transform:translateY(0)}
}  

/* SIJIL */

#sijil{
display:none;
margin-top:20px;
}

#installBtn{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<div class="winner-ticker">
  <div id="tickerText"></div>
</div>  

<header>
<h1>💎 GADIS QS HQ</h1>
<p>Sistem Semakan Kod Siri Rasmi</p>
</header>

<div class="container">

<!-- SEMAK KOD -->

<div class="box">

<div class="laser" id="laser"></div>

<h2>🔎 Semak Kod Siri</h2>

<input id="kodInput" placeholder="Masukkan Kod Siri">

<br>

<button onclick="semakKod()">Semak Kod</button>

<p id="loadingText"></p>

<div id="result"></div>

<img id="sijil" width="100%">

</div>

<!-- COUNTER HADIAH -->

<h2>💰 Jumlah Hadiah Disahkan</h2>

<div class="counter" id="counterRM">RM0</div>

<!-- GRAF HADIAH -->

<canvas id="graf"></canvas>

<h2>📍 Peta Pemenang Malaysia</h2>

<div id="map"></div>

<button id="installBtn">📲 Install App</button>

</div>

<script>

/* SERVER */

const WEB_APP="https://script.google.com/macros/s/AKfycbxAh5FU9Yq89oFD3Yg5VAGtVENdqAJKLRCrls4XJGz-XFFntRdFtU5INgA6Yi1pmPOr/exec";
fetch(WEB_APP + "?mode=map")
.then(res=>res.json())
.then(data=>{

let textList=[];

data.forEach(w=>{
textList.push(
"TAHNIAH: "+w.nama+
" dari "+w.lokasi+
" TELAH MENEBUS RM"+w.hadiah
);
});

document.getElementById("tickerText").innerText =
textList.join("   ★   ");

});
  
/* SEMAK KOD */

function semakKod(){

const kod=document.getElementById("kodInput").value.trim().toUpperCase();

const laser=document.getElementById("laser");
const loading=document.getElementById("loadingText");

laser.style.display="block";
loading.innerHTML="⏳ Sedang menyemak kod siri...";
loading.className="loading";

fetch(WEB_APP+"?mode=semak&kod="+kod)

.then(res=>res.json())

.then(data=>{

laser.style.display="none";
loading.innerHTML="";

if(!data.success){

document.getElementById("result").innerHTML=
"<b style='color:red'>"+data.kod_siri_status+"</b>";

return;

}

let html=`

<div class="resultCard">

<h3 style="color:green">${data.kod_siri_status}</h3>

<b>Nama:</b> ${data.nama}<br>
<b>Hadiah:</b> ${data.hadiah}<br>
<b>Bandar / Negeri:</b> ${data.bandar_negeri}<br>
<b>Status Tebusan:</b> ${data.status_penebusan}

</div>

`;

document.getElementById("result").innerHTML=html;

if(data.sijil_url){
document.getElementById("sijil").src=data.sijil_url;
document.getElementById("sijil").style.display="block";
}

})

.catch(err=>{

laser.style.display="none";

loading.innerHTML="Ralat sambungan server";

});

}

/* COUNTER HADIAH */

let target=500000;
let current=0;

function updateCounter(){

current+=500;

if(current>target) current=target;

document.getElementById("counterRM").innerText="RM"+current.toLocaleString();

if(current<target) requestAnimationFrame(updateCounter);

}

updateCounter();

/* GRAF */

new Chart(document.getElementById("graf"),{

type:'line',

data:{
labels:["Jan","Feb","Mac","Apr","Mei","Jun"],
datasets:[{
label:"Jumlah Hadiah",
data:[50000,70000,120000,200000,350000,500000],
borderColor:"#ff0080",
tension:0.4
}]
},

options:{animation:{duration:3000}}

});

/* MAP */

var map = L.map('map').setView([4.2,101.9],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* ambil data pemenang dari Apps Script */

fetch(WEB_APP + "?mode=map")
.then(res=>res.json())
.then(data=>{

data.forEach((w,i)=>{

setTimeout(()=>{

var glowIcon=L.divIcon({
className:'drop',
html:'<div class="marker-glow"></div>',
iconSize:[20,20]
});

L.marker([w.lat,w.lng],{icon:glowIcon})
.addTo(map)
.bindPopup(
"<b>"+w.nama+"</b><br>"+w.lokasi
);

},i*500);  // delay supaya pin jatuh satu persatu

});

});

/* PWA INSTALL */

let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("installBtn").style.display="block";

});

document.getElementById("installBtn").onclick=()=>{

deferredPrompt.prompt();

};

/* SERVICE WORKER */

if('serviceWorker' in navigator){

navigator.serviceWorker.register('/service-worker.js');

}

</script>

</body>
</html>
